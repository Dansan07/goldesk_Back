spring.application.name=goldesk

# URL de la base de datos
spring.datasource.url=jdbc:postgresql://localhost:5432/Torneo

# Usuario y contraseńa
spring.datasource.username=${USER_DB}
spring.datasource.password=${PASS_DB}

# Driver
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Para evitar el error de certificados que tuviste antes
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
# Tiempo de espera para que no se quede colgado si el servidor no responde
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
